<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}EmoSense{% endblock %}</title>

    <!-- Restaurar tema antes de pintar para evitar parpadeo -->
    <script>(function(){var t=localStorage.getItem('emosense-theme');if(t)document.documentElement.setAttribute('data-bs-theme',t);})();</script>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
          rel="stylesheet">

    <!-- Estilos propios -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

    {% block head %}{% endblock %}
</head>
<body>

    <!-- Navbar (siempre oscura independientemente del tema de la página) -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark" data-bs-theme="dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{{ url_for('main.index') }}">
                <i class="bi bi-emoji-smile-fill me-2 text-warning"></i>EmoSense
            </a>
            <button class="navbar-toggler" type="button"
                    data-bs-toggle="collapse" data-bs-target="#navbarMain"
                    aria-controls="navbarMain" aria-expanded="false"
                    aria-label="Abrir menú">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarMain">
                <ul class="navbar-nav ms-auto align-items-lg-center">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('main.index') }}">
                            <i class="bi bi-house-fill me-1"></i>Inicio
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('main.capture_page') }}">
                            <i class="bi bi-camera-fill me-1"></i>Captura
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('main.history_page') }}">
                            <i class="bi bi-clock-history me-1"></i>Historial
                        </a>
                    </li>
                    <li class="nav-item ms-lg-2">
                        <button id="btn-theme-toggle" type="button"
                                class="btn btn-link nav-link px-2 border-0"
                                aria-label="Cambiar tema" title="Cambiar tema">
                            <i id="theme-icon" class="bi bi-eye-fill text-warning fs-5"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Contenido principal -->
    <main class="{% block main_class %}container{% endblock %} py-4">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-secondary text-center py-3 mt-auto">
        <small><i class="bi bi-emoji-smile me-1"></i>EmoSense &mdash; Reconocimiento de Emociones Faciales con IA</small>
    </footer>

    <!-- Bootstrap 5 JS bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    {% block scripts %}{% endblock %}

    <!-- Toggle claro/oscuro -->
    <script>
    (function () {
      var html = document.documentElement;
      var btn  = document.getElementById('btn-theme-toggle');
      var icon = document.getElementById('theme-icon');

      function applyTheme(theme) {
        html.setAttribute('data-bs-theme', theme);
        localStorage.setItem('emosense-theme', theme);
        if (theme === 'dark') {
          icon.className = 'bi bi-eye-fill text-warning fs-5';
        } else {
          icon.className = 'bi bi-eye-slash-fill fs-5';
          icon.style.color = '#FFC107';
        }
      }

      btn.addEventListener('click', function () {
        applyTheme(html.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark');
      });

      // Sincronizar icono con el tema ya aplicado al cargar
      applyTheme(html.getAttribute('data-bs-theme') || 'dark');
    })();
    </script>
</body>
</html>
